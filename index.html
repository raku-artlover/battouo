<!DOCTYPE html>
<html>
<head>
<title>抜刀ゲーム</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

#text{
font-size:60px;
margin-top:200px;
}

button{
font-size:30px;
}
</style>

</head>

<body>

<h1>⚔ 抜刀チャレンジ</h1>

<button onclick="startGame()">START</button>

<div id="text">
接続してください
</div>


<script>

let port;
let reader;

let distance=0;
let target;


// Arduino接続
async function connect(){

port=await navigator.serial.requestPort();

await port.open({
baudRate:9600
});

reader=port.readable.getReader();

let buffer="";


while(true){

const {value,done}=await reader.read();

if(done)break;


buffer+=new TextDecoder().decode(value);


let lines=buffer.split("\n");

buffer=lines.pop();


for(let line of lines){

let num=Number(line.trim());


if(!isNaN(num)){

distance=num;

console.log("距離:",distance);

}

}

}

}


// ゲーム開始
async function startGame(){

if(!port){

await connect();

}


target=Math.floor(Math.random()*40)+10;


document.getElementById("text").innerHTML=
target+"cm 抜け！";


let count=3;


let timer=setInterval(()=>{


document.getElementById("text").innerHTML=count;


if(count==0){

clearInterval(timer);


let result=distance;

let diff=Math.abs(target-result);

let score=100-diff*10;


if(score<0){
score=0;
}


let evaluation;


if(diff<=2){

evaluation="達人級 ⚔";

}else if(diff<=5){

evaluation="かなり近い！";

}else if(diff<=10){

evaluation="惜しい！";

}else{

evaluation="修行不足";

}


document.getElementById("text").innerHTML=
`
結果<br>
目標:${target}cm<br>
実測:${result}cm<br>
差:${diff}cm<br>
点数:${score}<br>
${evaluation}
`;

}


count--;


},1000);


}

</script>

</body>
</html>
