<!DOCTYPE html>
<html>
<head>
<title>抜刀ゲーム</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

#text{
font-size:60px;
margin-top:200px;
}

button{
font-size:30px;
}
</style>

</head>

<body>

<h1>⚔ 抜刀チャレンジ</h1>

<button onclick="connect()">接続</button>
<button onclick="startGame()">START</button>

<div id="text">
接続してください
</div>


<script>

let port;
let reader;

let distance=0;
let startDistance=0;



// Arduino接続
async function connect(){

try{

port=await navigator.serial.requestPort();

await port.open({
baudRate:9600
});


document.getElementById("text").innerHTML=
"接続成功";


reader=port.readable.getReader();


let buffer="";


while(true){

const {value,done}=await reader.read();

if(done)break;


buffer+=new TextDecoder().decode(value);


let lines=buffer.split("\n");

buffer=lines.pop();


for(let line of lines){

let num=Number(line.trim());


if(!isNaN(num)){

distance=num;

console.log("距離:",distance);

}

}

}


}catch(e){

document.getElementById("text").innerHTML=
"接続失敗";

console.log(e);

}

}



// ゲーム開始
function startGame(){


startDistance=distance;


document.getElementById("text").innerHTML=
"開始";


let count=3;


let timer=setInterval(()=>{


document.getElementById("text").innerHTML=count;



if(count==0){


clearInterval(timer);



let result=distance;


let diff=result-startDistance;



document.getElementById("text").innerHTML=
`
結果<br>
開始:${startDistance}cm<br>
終了:${result}cm<br>
増加:${diff}cm
`;

}


count--;


},1000);


}

</script>

</body>
</html>
