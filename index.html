<!DOCTYPE html>
<html>
<head>
<title>抜刀ゲーム</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}
#text{
font-size:60px;
margin-top:200px;
}
button{
font-size:30px;
}
</style>
</head>

<body>

<h1>⚔ 抜刀チャレンジ</h1>

<button onclick="startGame()">START</button>

<div id="text">
接続してください
</div>

<script>

let port;
let reader;

let distance=0;
let startDistance=0;
let endDistance=0;


async function connect(){

port=await navigator.serial.requestPort();

await port.open({
baudRate:9600
});

reader=port.readable.getReader();

let buffer="";

while(true){

const {value,done}=await reader.read();

if(done)break;

buffer+=new TextDecoder().decode(value);

let lines=buffer.split("\n");

buffer=lines.pop();

for(let line of lines){

let num=parseInt(line.trim());

if(!isNaN(num)){

distance=num;

console.log("距離:",distance);

}

}

}

}


async function startGame(){

if(!port){

await connect();

}

startDistance=distance;

document.getElementById("text").innerHTML=
"開始距離："+startDistance+"cm";


let count=3;


let timer=setInterval(()=>{

document.getElementById("text").innerHTML=count;


if(count==0){

clearInterval(timer);

endDistance=distance;


let diff=Math.abs(
endDistance-startDistance
);


document.getElementById("text").innerHTML=
`
結果<br>
開始:${startDistance}cm<br>
終了:${endDistance}cm<br>
差:${diff}cm
`;

}

count--;

},1000);

}

</script>

</body>
</html>
